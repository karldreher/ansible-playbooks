---
# Configure the GitHub CLI apt repository on Debian-based systems.
# Reference: https://github.com/cli/cli/blob/trunk/docs/install_linux.md#debian

- name: Create /etc/apt/keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download GitHub CLI GPG keyring
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    mode: "0644"
  become: true

- name: Get dpkg architecture
  ansible.builtin.command: dpkg --print-architecture
  register: misc_packages_dpkg_arch
  changed_when: false

- name: Add GitHub CLI apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ misc_packages_dpkg_arch.stdout }}
      signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg]
      https://cli.github.com/packages stable main
    filename: github-cli
    state: present
  become: true
