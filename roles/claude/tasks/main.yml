---
# tasks file for claude

- name: Create .claude directory
  ansible.builtin.file:
    path: "{{ homedir.stdout }}/.claude"
    state: directory
    mode: "0755"

- name: Configure claude settings and CLAUDE.md
  ansible.builtin.include_tasks: config.yml

- name: Install claude skills
  ansible.builtin.include_tasks: skills.yml

- name: Manage Claude plugins
  ansible.builtin.include_tasks: plugins.yml
