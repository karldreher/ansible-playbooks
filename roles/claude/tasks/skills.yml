---
# Manage claude skills/plugins

- name: Find skill templates
  ansible.builtin.find:
    paths: "{{ role_path }}/templates/skills"
    patterns: "SKILL.md.j2"
    recurse: true
  register: skill_templates

- name: Create skill directories
  ansible.builtin.file:
    path: "{{ homedir.stdout }}/.claude/skills/{{ item.path | dirname | basename }}"
    state: directory
    mode: "0755"
  loop: "{{ skill_templates.files }}"
  loop_control:
    label: "{{ item.path | dirname | basename }}"

- name: Template skills
  ansible.builtin.template:
    src: "{{ item.path }}"
    dest: "{{ homedir.stdout }}/.claude/skills/{{ item.path | dirname | basename }}/SKILL.md"
    mode: "0644"
  loop: "{{ skill_templates.files }}"
  loop_control:
    label: "{{ item.path | dirname | basename }}"
