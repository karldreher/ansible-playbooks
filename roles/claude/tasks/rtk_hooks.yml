---
# Conditionally add the rtk Bash rewrite hook to merged_claude_settings.
# The hook script must exist on disk (placed by rtk init -g) before we write it
# into settings.json — otherwise the hook entry would reference a missing file.

- name: Check if rtk hook script exists
  ansible.builtin.stat:
    path: "{{ homedir.stdout }}/.claude/hooks/rtk-rewrite.sh"
  register: claude_rtk_rewrite_hook

- name: Merge rtk hook into settings
  ansible.builtin.set_fact:
    merged_claude_settings: >-
      {{
        merged_claude_settings
        | combine(
            {
              'hooks': {
                'PreToolUse': [
                  {
                    'matcher': 'Bash',
                    'hooks': [
                      {
                        'type': 'command',
                        'command': homedir.stdout ~ '/.claude/hooks/rtk-rewrite.sh'
                      }
                    ]
                  }
                ]
              }
            } if claude_rtk_rewrite_hook.stat.exists else {},
            recursive=true
          )
      }}
