---
# Configure claude settings.json and CLAUDE.md

- name: Check if settings.json exists
  ansible.builtin.stat:
    path: "{{ homedir.stdout }}/.claude/settings.json"
  register: claude_settings_file

- name: Read existing settings.json
  ansible.builtin.slurp:
    src: "{{ homedir.stdout }}/.claude/settings.json"
  register: claude_existing_settings_raw
  when: claude_settings_file.stat.exists

- name: Parse existing settings
  ansible.builtin.set_fact:
    claude_existing_settings: "{{ claude_existing_settings_raw.content | b64decode | from_json }}"
  when: claude_settings_file.stat.exists

- name: Set empty settings when file does not exist
  ansible.builtin.set_fact:
    claude_existing_settings: {}
  when: not claude_settings_file.stat.exists

- name: Build merged settings
  ansible.builtin.set_fact:
    claude_merged_settings: >-
      {{
        claude_existing_settings
        | combine(claude_settings, recursive=true)
        | combine({
            'permissions': {
              'allow': (
                (claude_existing_settings.permissions.allow | default([]))
                + claude_settings.permissions.allow
              ) | unique
            }
          }, recursive=true)
      }}

- name: Check if RTK.md exists
  ansible.builtin.stat:
    path: "{{ homedir.stdout }}/.claude/RTK.md"
  register: claude_rtk_md

# Coupled to rtk's `rtk init -g --auto-patch` output shape (command "rtk hook claude",
# matcher "Bash"). If a future rtk version changes that, this will read as false even
# though RTK is working.
- name: Determine whether the RTK Bash hook is registered
  ansible.builtin.set_fact:
    claude_rtk_hook_installed: >-
      {{
        (claude_merged_settings.hooks.PreToolUse | default([]))
        | selectattr('matcher', 'equalto', 'Bash')
        | map(attribute='hooks')
        | flatten
        | selectattr('command', 'equalto', 'rtk hook claude')
        | list
        | length > 0
      }}

- name: Determine whether RTK is fully active
  ansible.builtin.set_fact:
    claude_rtk_active: "{{ claude_rtk_md.stat.exists and claude_rtk_hook_installed }}"

- name: Write merged settings.json
  ansible.builtin.copy:
    content: "{{ claude_merged_settings | to_nice_json }}\n"
    dest: "{{ homedir.stdout }}/.claude/settings.json"
    mode: "0644"

- name: Template CLAUDE.md
  ansible.builtin.template:
    src: templates/CLAUDE.md.j2
    dest: "{{ homedir.stdout }}/.claude/CLAUDE.md"
    mode: "0644"
