---
- name: Install marketplace skills
  ansible.builtin.command: bunx skills add -g {{ item }} --yes
  args:
    creates: "{{ homedir.stdout }}/.claude/skills/{{ item.split('--skill ')[1] | trim }}/SKILL.md"
  loop: "{{ claude_marketplace_skills }}"
  loop_control:
    label: "{{ item.split('--skill ')[1] | trim }}"
  when: ansible_facts["os_family"] == "Darwin"

- name: Remove marketplace skills
  ansible.builtin.command: bunx skills remove -g {{ item }} --yes
  args:
    removes: "{{ homedir.stdout }}/.claude/skills/{{ item.split('--skill ')[1] | trim }}/SKILL.md"
  loop: "{{ claude_marketplace_skills_remove }}"
  loop_control:
    label: "{{ item.split('--skill ')[1] | trim }}"
  when: ansible_facts["os_family"] == "Darwin"
