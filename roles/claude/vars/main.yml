# Reference:
# https://code.claude.com/docs/en/settings.md
# https://code.claude.com/docs/en/permissions.md

# Skills from https://skills.sh/
# Each entry: { repo: "<owner/repo>", skill: "<skill-name>" }
claude_marketplace_skills:
  - repo: "mattpocock/skills"
    skill: "codebase-design"         # 66.5K installs — design-level codebase understanding
  - repo: "delphine-l/claude_global"
    skill: "token-efficiency"        # 1.6K installs — reduce token waste in responses
  - repo: "agricidaniel/claude-seo"
    skill: "seo-images"              # 3K installs — SEO image optimization (alt text, filenames, etc.)

# Skills to uninstall — same format as claude_marketplace_skills
claude_marketplace_skills_remove: []

claude_settings:
  attribution:
    commit: ""
    pr: ""
  autoMemoryEnabled: false
  permissions:
    # Always allow these tools, and never ask for permission to use them.
    # Add entries in alphabetical order for readability.  Maintain the sections.
    allow:
      - "Bash(cat*)"
      - "Bash(find*)"
      # Super cool cheatcodes.
      - "Bash(* --version)"
      - "Bash(* --help *)"
      # Apt (Linux), read-only subcommands only. Mutating subcommands (install,
      # remove, upgrade, etc.) are denied below — package changes belong in
      # roles/misc_packages, not ad-hoc commands.
      - "Bash(apt list*)"
      - "Bash(apt search*)"
      - "Bash(apt show*)"
      - "Bash(apt-cache policy*)"
      - "Bash(apt-cache search*)"
      - "Bash(apt-cache show*)"
      # Homebrew (macOS), read-only subcommands only. Mutating subcommands (install,
      # remove, upgrade, etc.) are denied below — package changes belong in
      # roles/misc_packages, not ad-hoc commands.
      - "Bash(brew config*)"
      - "Bash(brew deps*)"
      - "Bash(brew doctor*)"
      - "Bash(brew info*)"
      - "Bash(brew leaves*)"
      - "Bash(brew list*)"
      - "Bash(brew outdated*)"
      - "Bash(brew search*)"
      - "Bash(brew uses*)"
      # Gcloud
      - "Bash(gcloud run services describe*)"
      - "Bash(gcloud logging read*)"
      # GH cli, mostly read oriented.
      - "Bash(gh issue list*)"
      - "Bash(gh issue view*)"
      - "Bash(gh pr checks*)"
      - "Bash(gh pr create*)"
      - "Bash(gh pr diff*)"
      - "Bash(gh pr list*)"
      - "Bash(gh pr view*)"
      - "Bash(gh release list*)"
      - "Bash(gh release view*)"
      - "Bash(gh repo view*)"
      - "Bash(gh run list*)"
      - "Bash(gh run view*)"
      - "Bash(gh run watch*)"
      - "Bash(gh search*)"
      # Git commands that are safe to allow without confirmation.
      - "Bash(git add*)"
      - "Bash(git commit*)"
      - "Bash(git diff*)"
      - "Bash(git log*)"
      - "Bash(git show*)"
      - "Bash(git status*)"
      # Cargo (Rust)
      - "Bash(cargo build*)"
      - "Bash(cargo check*)"
      - "Bash(cargo test*)"
      # Golang
      - "Bash(go build*)"
      - "Bash(go test*)"
      - "Bash(go mod tidy)"
      # Bash-invoked grep.
      - "Bash(grep*)"
      # jq JSON processor.
      - "Bash(jq*)"
      - "Bash(ls*)"
      # npm read/install commands.
      - "Bash(npm audit*)"
      - "Bash(npm explain*)"
      - "Bash(npm i*)"
      - "Bash(npm install*)"
      - "Bash(npm list*)"
      - "Bash(npm outdated*)"
      - "Bash(npm run lint*)"
      - "Bash(npm run test*)"
      - "Bash(npm view*)"
      # Bun/bunx read/install commands.
      - "Bash(bun i*)"
      - "Bash(bun install*)"
      - "Bash(bun outdated*)"
      - "Bash(bun pm*)"
      - "Bash(bun run lint*)"
      - "Bash(bun run test*)"
      - "Bash(bun run tsc*)"
      - "Bash(bun view*)"
      - "Bash(bunx gitignore*)"
      # UV Python package/project manager.
      - "Bash(uv lock*)"
      - "Bash(uv pip install*)"
      - "Bash(uv pip list*)"
      - "Bash(uv pip show*)"
      - "Bash(uv sync*)"
      - "Bash(uv tree*)"
      - "Bash(uv version*)"
      - "Bash(uvx run ruff*)"
      # yq YAML processor.
      - "Bash(yq*)"
      # Always allow searching
      - "WebSearch"
    # Never allow these, even if the user would otherwise approve them. Package
    # changes belong in the relevant Ansible role (e.g. roles/misc_packages), not
    # ad-hoc shell commands. Read-only subcommands remain allowed above.
    deny:
      # Apt/apt-get (Linux) mutating subcommands.
      - "Bash(apt install*)"
      - "Bash(apt remove*)"
      - "Bash(apt purge*)"
      - "Bash(apt upgrade*)"
      - "Bash(apt dist-upgrade*)"
      - "Bash(apt autoremove*)"
      - "Bash(apt update*)"
      - "Bash(apt-get install*)"
      - "Bash(apt-get remove*)"
      - "Bash(apt-get purge*)"
      - "Bash(apt-get upgrade*)"
      - "Bash(apt-get dist-upgrade*)"
      - "Bash(apt-get autoremove*)"
      - "Bash(apt-get update*)"
      # Mutating apt/apt-get commands nearly always require sudo, while the
      # read-only ones allowed above never do — so deny sudo apt/apt-get outright.
      - "Bash(sudo apt*)"
      - "Bash(sudo apt-get*)"
      # Homebrew (macOS) mutating subcommands.
      - "Bash(brew install*)"
      - "Bash(brew reinstall*)"
      - "Bash(brew uninstall*)"
      - "Bash(brew remove*)"
      - "Bash(brew upgrade*)"
      - "Bash(brew update*)"
      - "Bash(brew tap*)"
      - "Bash(brew untap*)"
      - "Bash(brew pin*)"
      - "Bash(brew unpin*)"
      - "Bash(brew link*)"
      - "Bash(brew unlink*)"
      - "Bash(brew cleanup*)"
      - "Bash(brew services*)"
      # Ansible — never run playbooks directly; they apply real changes to
      # real machines and should only be run by the user.
      - "Bash(ansible-playbook*)"
      - "Bash(sudo ansible-playbook*)"
    defaultMode: "plan"
