# Reference:
# https://code.claude.com/docs/en/settings.md
# https://code.claude.com/docs/en/permissions.md
claude_settings:
  permissions:
    allow:
      - "WebSearch"
      - "Bash(gh pr list:*)"
      - "Bash(gh pr view:*)"
      - "Bash(gh pr diff:*)"
      - "Bash(gh pr checks:*)"
      - "Bash(gh issue list:*)"
      - "Bash(gh issue view:*)"
      - "Bash(gh repo view:*)"
      - "Bash(gh release list:*)"
      - "Bash(gh release view:*)"
      - "Bash(gh run list:*)"
      - "Bash(gh run view:*)"
      - "Bash(git add:*)"
      - "Bash(git commit:*)"
    defaultMode: "plan"
