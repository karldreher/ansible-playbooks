# Reference:
# https://code.claude.com/docs/en/settings.md
# https://code.claude.com/docs/en/permissions.md
claude_settings:
  permissions:
    # Always allow these tools, and never ask for permission to use them. 
    # Add entries in alphabetical order for readability.  Maintain the sections.
    allow:
      - "Bash(cat:*)"
      - "Bash(find:*)"
      # Super cool cheatcodes. 
      - "Bash(* --version)"
      - "Bash(* --help *)"
      # Gcloud
      - "Bash(gcloud run services describe:*)"
      - "Bash(gcloud logging read:*)"
      # GH cli, mostly read oriented.  
      - "Bash(gh issue list:*)"
      - "Bash(gh issue view:*)"
      - "Bash(gh pr checks:*)"
      - "Bash(gh pr create:*)"
      - "Bash(gh pr diff:*)"
      - "Bash(gh pr list:*)"
      - "Bash(gh pr view:*)"
      - "Bash(gh release list:*)"
      - "Bash(gh release view:*)"
      - "Bash(gh repo view:*)"
      - "Bash(gh run list:*)"
      - "Bash(gh run view:*)"
      - "Bash(gh run watch:*)"
      - "Bash(gh search:*)"
      # Git commands that are safe to allow without confirmation.  
      - "Bash(git add:*)"
      - "Bash(git commit:*)"
      - "Bash(git diff:*)"
      - "Bash(git log:*)"
      - "Bash(git show:*)"
      - "Bash(git status:*)"
      # Golang
      - "Bash(go build:*)"
      - "Bash(go test:*)"
      - "Bash(go mod tidy)"
      # Bash-invoked grep.
      - "Bash(grep:*)"
      - "Bash(ls:*)"
      # npm read/install commands.
      - "Bash(npm audit:*)"
      - "Bash(npm explain:*)"
      - "Bash(npm i:*)"
      - "Bash(npm install:*)"
      - "Bash(npm list:*)"
      - "Bash(npm outdated:*)"
      - "Bash(npm run lint:*)"
      - "Bash(npm run test:*)"
      - "Bash(npm view:*)"
      # Bun/bunx read/install commands.
      - "Bash(bun i:*)"
      - "Bash(bun install:*)"
      - "Bash(bun outdated:*)"
      - "Bash(bun pm:*)"
      - "Bash(bun run lint:*)"
      - "Bash(bun run test:*)"
      - "Bash(bun view:*)"
      - "Bash(bunx gitignore:*)"
      # UV Python package/project manager.
      - "Bash(uv lock:*)"
      - "Bash(uv pip install:*)"
      - "Bash(uv pip list:*)"
      - "Bash(uv pip show:*)"
      - "Bash(uv sync:*)"
      - "Bash(uv tree:*)"
      - "Bash(uv version:*)"
      - "Bash(uvx run ruff:*)"
      # Always allow searching
      - "WebSearch"
    defaultMode: "plan"
