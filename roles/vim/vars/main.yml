---
# vars file for vim
vim_conventional_commit_types:
  - name: feat
    description: A new feature
  - name: fix
    description: A bug fix
  - name: docs
    description: Documentation only changes
  - name: style
    description: Formatting only, no code change
  - name: refactor
    description: Neither fixes a bug nor adds a feature
  - name: perf
    description: Performance improvement
  - name: test
    description: Adding or correcting tests
  - name: build
    description: Build system or dependency changes
  - name: ci
    description: CI configuration or scripts
  - name: chore
    description: Other changes, no src or test changes
  - name: revert
    description: Reverts a previous commit
